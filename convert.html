<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <link rel="canonical" href="https://mergepdfpro.netlify.app/convert.html" />
    <title>Convert Images Online | PDF Merge Pro</title>
    <meta
      name="description"
      content="Convert JPG, PNG, and WEBP images instantly in your browser."
    />
    <meta name="author" content="PDF Merge Pro" />
    <meta name="robots" content="index, follow" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./favicon.ico" />

    <script>
      (function () {
        const savedTheme =
          localStorage.getItem("theme") || localStorage.getItem("pdf-theme");
        if (savedTheme === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
          localStorage.setItem("theme", "dark");
        } else {
          document.documentElement.setAttribute("data-theme", "light");
          localStorage.setItem("theme", "light");
        }
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="navbar">
        <div class="brand">
          <span class="logo-dot"></span>
          <span class="brand-text">PDF Merge Pro</span>
        </div>
        <div class="nav-links">
          <a href="https://mergepdfpro.netlify.app/index.html">Merge PDF</a>
          <a href="https://mergepdfpro.netlify.app/convert.html" class="active">Convert Images</a>
          <a href="https://mergepdfpro.netlify.app/compress.html">Compress Images</a>
          <a href="https://mergepdfpro.netlify.app/about.html">About</a>
        </div>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode">
          <span class="toggle-icon" aria-hidden="true"></span>
          <span class="toggle-text">Theme</span>
        </button>
      </nav>
    </header>

    <main>
      <section class="hero container">
        <div class="hero-copy">
          <p class="eyebrow">Image tools</p>
          <h1>Convert Images with Pixel-Perfect Results</h1>
          <p>Transform JPG, PNG, and WEBP files instantly, with zero uploads.</p>
        </div>
        <div class="hero-card glass">
          <div class="converter-drop" id="imageDropZone">
            <div class="converter-drop-content">
              <div class="converter-drop-icon">[]</div>
              <p>Drag & drop images here</p>
              <span>or use the button below</span>
            </div>
            <input id="imageInput" type="file" accept="image/jpeg,image/png,image/webp" multiple />
          </div>
          <div class="converter-status" id="imageStatus" role="status" aria-live="polite"></div>
        </div>
      </section>

      <section class="tool-shell container glass">
        <div class="tool-grid">
          <div class="tool-card">
            <div class="converter-controls">
              <label for="imageFormat">Output format</label>
              <select id="imageFormat">
                <option value="jpg">JPG</option>
                <option value="png">PNG</option>
                <option value="webp">WEBP</option>
              </select>
            </div>

            <div class="converter-actions">
              <button class="secondary" id="selectImagesBtn" type="button">Select Images</button>
              <button class="primary primary-gradient" id="convertImagesBtn" type="button">
                Convert Now
              </button>
              <button class="ghost" id="clearImagesBtn" type="button">Clear</button>
            </div>
          </div>

          <div class="converter-results">
            <div class="results-header">
              <h3>Converted files</h3>
              <span id="imageCount">0 files</span>
            </div>
            <ul class="results-list" id="imageResults"></ul>
          </div>
        </div>
      </section>

      <div class="converter-loading" id="imageLoading" hidden>
        <div class="spinner"></div>
        <p>Converting images...</p>
      </div>
    </main>

    <script src="./js/convert.js" defer></script>
  </body>
</html>
